    background-repeat:no-repeat;
    background-position:center;
    background-size:contain;
    transform: translate(-50%, -50%);
    pointer-events:none;
    z-index:0;
    opacity:0.9;
  }
  header, .layout{
    position:relative;
    z-index:1;
  }
  header{
    padding: 16px 28px;
    border-bottom: 1px solid var(--gold-line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    background: linear-gradient(180deg, rgba(203,161,53,0.05), transparent);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand-badge{
    width:52px;
    height:52px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #fbf6e8, #e9dfc4 60%, #d8cba0);
    box-shadow: 0 0 0 1px var(--gold-line), 0 4px 12px rgba(0,0,0,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .brand-badge img{
    width:38px;
    height:38px;
    object-fit:contain;
  }
  .brand-text{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  header h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 25px;
    margin:0;
    letter-spacing: 0.6px;
    color: var(--cream);
    line-height:1.1;
  }
  .brand-kicker{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 2.5px;
    color: var(--mustard);
    text-transform:uppercase;
  }
  header .date{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--mustard);
    letter-spacing: 0.5px;
  }
  .layout{
    display:flex;
    flex:1;
    min-height:0;
  }
  /* ---------- LEFT: menu ---------- */
  .menu-side{
    flex: 1.4;
    padding: 16px 20px 24px;
    overflow-y:auto;
  }
  .tabs{
    display:flex;
    gap:6px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .tab{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    padding:8px 14px;
    border-radius: 999px;
    background: var(--bg-panel);
    color: var(--cream);
    border: 1px solid var(--line);
    cursor:pointer;
    opacity:0.65;
    transition: all .15s ease;
  }
  .tab:hover{opacity:0.9;}
  .tab.active{
    background: var(--mustard);
    color: #1e2a22;
    opacity:1;
    border-color: var(--mustard);
    font-weight:600;
  }
  .cat-label{
    font-family:'Fraunces', serif;
    font-size: 15px;
    color: var(--sage);
    text-transform:uppercase;
    letter-spacing: 1.5px;
    margin: 18px 2px 8px;
  }
  .cat-label:first-of-type{margin-top:0;}
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap:10px;
  }
  .item-btn{
    text-align:left;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    cursor:pointer;
    color: var(--cream);
    transition: transform .08s ease, border-color .15s ease, background .15s ease;
    display:flex;
    flex-direction:column;
    gap:6px;
    min-height: 64px;
  }
  .item-btn:hover{
    border-color: var(--mustard);
    background: #35493a;
  }
  .item-btn:active{ transform: scale(0.97); }
  .item-name{
    font-size: 14px;
    line-height:1.3;
    font-weight:500;
  }
  .item-price{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--mustard);
  }
  .grid.alcohol .item-price{ color: var(--brick); }

  /* ---------- RIGHT: ticket / receipt ---------- */
  .ticket-side{
    flex: 1;
    max-width: 400px;
    border-left: 1px solid var(--line);
    display:flex;
    flex-direction:column;
    background: var(--bg-panel);
  }
  .table-rail{
    display:flex;
    align-items:center;
    gap:8px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line);
    flex-wrap:wrap;
  }
  .table-chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    padding: 7px 12px;
    border-radius: 6px 6px 2px 2px;
    background: #1b261e;
    border: 1px solid var(--line);
    border-top: 3px solid var(--sage);
    color: var(--cream);
    cursor:pointer;
    position:relative;
    opacity:0.7;
  }
  .table-chip.active{
    border-top-color: var(--mustard);
    background: #33452f;
    opacity:1;
    font-weight:600;
  }
  .table-chip .dot{
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    background: var(--mustard);
    margin-left:6px;
    opacity:0;
  }
  .table-chip.has-items .dot{ opacity:1; }
  .add-table{
    font-family:'IBM Plex Mono', monospace;
    font-size:18px;
    width:32px; height:32px;
    border-radius:6px;
    background:none;
    border: 1px dashed var(--line);
    color: var(--sage);
    cursor:pointer;
  }
  .add-table:hover{ border-color: var(--sage); }

  .receipt-wrap{
    flex:1;
    overflow-y:auto;
    padding: 18px 16px 8px;
  }
  .receipt{
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 18px 16px 14px;
    border-radius: 3px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    position:relative;
  }
  .receipt::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-8px;
    height:16px;
    background: repeating-linear-gradient(
      -45deg,
      var(--paper) 0 6px,
      transparent 6px 12px
    );
  }
  .receipt-logo{
    display:block;
    width:34px;
    height:34px;
    object-fit:contain;
    margin: 0 auto 4px;
    filter: grayscale(1) contrast(1.1);
    opacity:0.75;
  }
  .receipt h2{
    font-family:'Fraunces', serif;
    font-size:16px;
    text-align:center;
    margin: 0 0 2px;
    font-weight:700;
  }
  .receipt .sub{
    text-align:center;
    font-size:11px;
    color:#5c5c50;
    margin-bottom:10px;
    letter-spacing:0.5px;
  }
  .receipt hr{
    border:none;
    border-top: 1px dashed #9a9484;
    margin: 8px 0;
  }
  .line-item{
    display:flex;
    justify-content:space-between;
    gap:8px;
    padding: 4px 0;
    align-items:center;
  }
  .li-name{ flex:1; font-size:12.5px; }
  .li-qty-ctrl{
    display:flex;
    align-items:center;
    gap:4px;
  }
  .qty-btn{
    width:18px; height:18px;
    line-height:16px;
    text-align:center;
    border-radius:3px;
    border: 1px solid #b7b09c;
    background: #e8e0c8;
    color:#2a2a24;
    cursor:pointer;
    font-size:12px;
    padding:0;
  }
  .qty-btn:hover{ background:#dcd2b4; }
  .li-qty{ min-width:16px; text-align:center; font-size:12.5px; }
  .li-price{ font-size:12.5px; min-width:56px; text-align:right; }
  .li-remove{
    background:none;border:none;color:var(--danger);
    cursor:pointer; font-size:14px; padding:0 0 0 4px;
  }
  .empty-note{
    text-align:center;
    color:#8a8474;
    font-size:12.5px;
    padding: 14px 0 6px;
    font-family: 'Inter', sans-serif;
  }
  .total-row{
    display:flex;
    justify-content:space-between;
    font-size:15px;
    font-weight:700;
    margin-top:10px;
    padding-top:8px;
    border-top: 2px solid #2a2a24;
  }
  .actions{
    display:flex;
    gap:8px;
    padding: 10px 16px 18px;
  }
  .btn{
    flex:1;
    padding: 12px 10px;
    border-radius:8px;
    border:none;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
  }
  .btn-print{ background: var(--mustard); color:#1e2a22; }
  .btn-print:hover{ background:#dcb333; }
  .btn-clear{ background: transparent; color: var(--danger); border:1px solid var(--danger); }
  .btn-clear:hover{ background: rgba(165,83,60,0.15); }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:#3d5140; border-radius:4px; }

  @media (max-width: 760px){
    .layout{ flex-direction:column; }
    .ticket-side{ max-width:none; border-left:none; border-top:1px solid var(--line); }
  }

  @media print{
    body *{ visibility:hidden; }
    .receipt, .receipt *{ visibility:visible; }
    .receipt{ position:absolute; top:0; left:0; width:100%; box-shadow:none; }
    .li-remove, .qty-btn{ display:none; }
  }

  button:focus-visible, .item-btn:focus-visible, .tab:focus-visible, .table-chip:focus-visible{
    outline: 2px solid var(--mustard);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<header>

  ]
};

const TABLE_COUNT = 8;
let tables = {};
for(let i=1;i<=TABLE_COUNT;i++){ tables[i] = {}; }
let activeTable = 1;
let activeCat = "Обедно меню";

function fmt(n){
  return n.toFixed(2).replace('.', ',') + ' €';
}

function renderTabs(){
  const wrap = document.getElementById('catTabs');
  wrap.innerHTML = '';
  Object.keys(MENU).forEach(cat=>{
    const b = document.createElement('button');
    b.className = 'tab' + (cat===activeCat ? ' active':'');
    b.textContent = cat;
    b.onclick = ()=>{ activeCat = cat; renderTabs(); renderMenu(); };
    wrap.appendChild(b);
  });
}

function renderMenu(){
  const area = document.getElementById('menuArea');
  area.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'cat-label';
  label.textContent = activeCat;
  area.appendChild(label);

  const grid = document.createElement('div');
  grid.className = 'grid' + (activeCat === 'Алкохолни напитки' ? ' alcohol':'');
  MENU[activeCat].forEach(([name, price])=>{
    const btn = document.createElement('button');
    btn.className = 'item-btn';
    btn.innerHTML = `<span class="item-name">${name}</span><span class="item-price">${fmt(price)}</span>`;
    btn.onclick = ()=> addItem(name, price);
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

function addItem(name, price){
  const t = tables[activeTable];
  if(!t[name]){ t[name] = {price, qty:0}; }
  t[name].qty += 1;
  renderReceipt();
  renderRail();
}

function changeQty(name, delta){
  const t = tables[activeTable];
  if(!t[name]) return;
  t[name].qty += delta;
  if(t[name].qty <= 0){ delete t[name]; }
  renderReceipt();
  renderRail();
}

function removeItem(name){
  delete tables[activeTable][name];
  renderReceipt();
  renderRail();
}

function clearTable(){
  if(Object.keys(tables[activeTable]).length === 0) return;
  if(confirm('Да изчистя ли бележката за маса ' + activeTable + '?')){
    tables[activeTable] = {};
    renderReceipt();
    renderRail();
  }
}

function renderReceipt(){
  const t = tables[activeTable];
  const wrap = document.getElementById('lineItems');
  const emptyNote = document.getElementById('emptyNote');
  wrap.innerHTML = '';
  const names = Object.keys(t);
  emptyNote.style.display = names.length === 0 ? 'block' : 'none';

  let total = 0;
  names.forEach(name=>{
    const {price, qty} = t[name];
    total += price * qty;
    const row = document.createElement('div');
    row.className = 'line-item';
    row.innerHTML = `
      <span class="li-name">${name}</span>
      <span class="li-qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${escAttr(name)}', -1)">−</button>
        <span class="li-qty">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${escAttr(name)}', 1)">+</button>
      </span>
      <span class="li-price">${fmt(price*qty)}</span>
      <button class="li-remove" onclick="removeItem('${escAttr(name)}')" title="Премахни">✕</button>
    `;
    wrap.appendChild(row);
  });

  document.getElementById('tableLabel').textContent = 'МАСА ' + activeTable;
  document.getElementById('totalSum').textContent = fmt(total);
}

function escAttr(s){
  return s.replace(/'/g, "\\'");
}

function renderRail(){
  const rail = document.getElementById('tableRail');
  rail.innerHTML = '';
  for(let i=1;i<=TABLE_COUNT;i++){
    const hasItems = Object.keys(tables[i]).length > 0;
    const chip = document.createElement('button');
    chip.className = 'table-chip' + (i===activeTable ? ' active':'') + (hasItems ? ' has-items':'');
    chip.innerHTML = 'Маса ' + i + '<span class="dot"></span>';
    chip.onclick = ()=>{ activeTable = i; renderRail(); renderReceipt(); };
    rail.appendChild(chip);
  }
}

function printReceipt(){
  window.print();
}

function renderDate(){
  const d = new Date();
  const months = ['януари','февруари','март','април','май','юни','юли','август','септември','октомври','ноември','декември'];
  document.getElementById('today').textContent = d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

renderDate();
renderTabs();
renderMenu();
renderRail();
renderReceipt();
</script>

</body>
</html>
